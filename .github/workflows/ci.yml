name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit + integration tests (plumbing)
        run: python3 tests/test_tools.py
      - name: Deterministic ship proof (mock roles write real Dart; no live LLM)
        run: |
          echo "::notice::prove = control-plane + real files/commits. Not live OpenCode quality."
          python3 tests/test_prove.py
